name: Unit testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lib-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          extra-experimental-features = nix-command flakes

    - name: Run lib tests
      shell: bash
      run: |
        echo "# Test Results" > $GITHUB_STEP_SUMMARY
        nix run github:nixos/nixpkgs/nixos-unstable#nix-unit -- tests/lib.nix | tee -a $GITHUB_STEP_SUMMARY
